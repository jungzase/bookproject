<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Booklist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>도서 관리 시스템 </h1>

    <section class="admin-section">
        <h2>검색</h2>
        <div class="input-group">
            <input type="text" id="bookInput" placeholder="도서 제목을 입력하세요">
            <button onclick="handleCreate()">도서 등록</button>
        </div>
        
    </section>

    <hr>

    <section class="user-section">
        <h2>도서 목록 (User)</h2>
        <ul id="bookListUI"></ul>
        
        <div id="bookDetail" style="margin-top: 20px; padding: 10px; border: 1px solid #ddd; display: none;">
            <h3>도서 상세 정보</h3>
            <p id="detailContent">도서를 선택해주세요.</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
